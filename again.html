<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manual Swipe Carousel</title>
  <style>
    .carousel {
      display: flex;
    }

    .carousel::-webkit-scrollbar {
      display: none;
    }

    .carousel-item {
      flex: 0 0 80%;
      height: 300px;
      margin-right: 10px;
      background: #f2f2f2;
      border-radius: 12px;
      scroll-snap-align: start;
      display: flex;
    }
  </style>
</head>
<body>

  <div class="carousel" id="carousel">
    <div class="carousel-item">1</div>
    <div class="carousel-item">2</div>
    <div class="carousel-item">3</div>
  </div>

 
</body>
</html>
