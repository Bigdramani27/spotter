<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Infinite Logo Carousel</title>
  <style>

@keyframes scroll {
	0% { transform: translateX(0); }
	100% { transform: translateX(calc(-250px * 5))}
}

.slider {
	height: 80px;
  margin: auto;
	overflow:hidden;
	position: relative;
	width: 960px;

	&::after {
		right: 0;
		top: 0;
		transform: rotateZ(180deg);
	}

	&::before {
		left: 0;
		top: 0;
	}
	
	.slide-track {
		animation: scroll 40s linear infinite;
		display: flex;
		width: calc(250px * 10);
	}
	
	.slide {
    align-items: center; 
    justify-content: center; 
	}

  .slide img {
  max-height: 100%;
  max-width: 100%;
  object-fit: contain;
  display: block;
}
}
  </style>
</head>
