<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Horizontal Carousel</title>
  <style>
    body {
      background-color: #0f0f0f;
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      color: white;
    }

    .container {
    
      margin-left:auto;
      display: flex;
      gap: 20px;
    }



    .carousel-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .carousel-track {
      display: flex;
      overflow-x: auto;
      scroll-behavior: smooth;
      gap: 20px;
      padding-bottom: 10px;
    }

    .carousel-track::-webkit-scrollbar {
      display: none;
    }

    .carousel-item {
      flex: 0 0 auto;
      width: 300px;
      border-radius: 10px;
      overflow: hidden;
    }

    .carousel-item img {
      width: 100%;
      height: auto;
      display: block;
    }

    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0, 0, 0, 0.6);
      border: none;
      color: white;
      padding: 10px;
      cursor: pointer;
      z-index: 10;
      font-size: 20px;
      border-radius: 50%;
    }

    .arrow.left {
      left: 10px;
    }

    .arrow.right {
      right: 10px;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="carousel-container">
      <button class="arrow left" onclick="scrollCarousel('left')">&#10094;</button>
      <div class="carousel-track" id="carousel">
        <div class="carousel-item"><img src="https://linear.app/cdn-cgi/imagedelivery/fO02fVwohEs9s9UHFwon6A/b4ccc6c0-b86b-4e9c-04a9-2ea66fa48e00/f=auto,dpr=2,q=95,fit=scale-down,metadata=none" alt="1" /></div>
   <div class="carousel-item"><img src="https://linear.app/cdn-cgi/imagedelivery/fO02fVwohEs9s9UHFwon6A/b4ccc6c0-b86b-4e9c-04a9-2ea66fa48e00/f=auto,dpr=2,q=95,fit=scale-down,metadata=none" alt="1" /></div>
   <div class="carousel-item"><img src="https://linear.app/cdn-cgi/imagedelivery/fO02fVwohEs9s9UHFwon6A/b4ccc6c0-b86b-4e9c-04a9-2ea66fa48e00/f=auto,dpr=2,q=95,fit=scale-down,metadata=none" alt="1" /></div>
   <div class="carousel-item"><img src="https://linear.app/cdn-cgi/imagedelivery/fO02fVwohEs9s9UHFwon6A/b4ccc6c0-b86b-4e9c-04a9-2ea66fa48e00/f=auto,dpr=2,q=95,fit=scale-down,metadata=none" alt="1" /></div>
   <div class="carousel-item"><img src="https://linear.app/cdn-cgi/imagedelivery/fO02fVwohEs9s9UHFwon6A/b4ccc6c0-b86b-4e9c-04a9-2ea66fa48e00/f=auto,dpr=2,q=95,fit=scale-down,metadata=none" alt="1" /></div>
   <div class="carousel-item"><img src="https://linear.app/cdn-cgi/imagedelivery/fO02fVwohEs9s9UHFwon6A/b4ccc6c0-b86b-4e9c-04a9-2ea66fa48e00/f=auto,dpr=2,q=95,fit=scale-down,metadata=none" alt="1" /></div>
      </div>
      <button class="arrow right" onclick="scrollCarousel('right')">&#10095;</button>
    </div>
  </div>

  <script>
    function scrollCarousel(direction) {
      const carousel = document.getElementById("carousel");
      const scrollAmount = 320;

      if (direction === "left") {
        carousel.scrollBy({ left: -scrollAmount, behavior: "smooth" });
      } else {
        carousel.scrollBy({ left: scrollAmount, behavior: "smooth" });
      }
    }
  </script>
</body>
</html>
