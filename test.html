    <div class="css_embed display-none w-embed">
      <style>
        @media (max-width: 991px) {
          .main-feature-cards {
            margin-top: 0 !important;
          }
        }

        @media (max-width: 1199px) {
          .main-feature-cards {
            margin-top: -64px;
          }
        }

        @media (min-width: 1200px) {
          .main-feature-card {
            & * {
              transition: all 0.4s;
            }

            &::before {
              left: 0;
            }

            &::after {
              right: 0;
            }

            &::before,
            &::after {
              top: 50%;
              content: '';
              position: absolute;
              height: 4px;
              width: 0;
              background: transparent;
              transform: translateY(-50%);
              opacity: 0;
              z-index: -1;
              transition: all 0.2s;
            }

            &:last-child::after,
            &:first-child::before {
              display: none;
            }

            &.is-active,
            &:hover {
              & .main-feature-card__arrow {
                opacity: 100%;
                bottom: -10px;
              }

              &::before,
              &::after {
                opacity: 100%;
                width: 50%;
              }

              &::after {
                right: -40%;
              }

              &::before {
                left: -40%;
              }

              & .main-feature-card__node {
                opacity: 100%;
              }
            }
          }

          .main-feature-card[data-color='orange'] {
            &::after {
              background: linear-gradient(90deg, #f17f20 23%, #e82c51 76%, #d9d9e2 100%);
            }
          }

          .main-feature-card[data-color='pink'] {
            & .main-feature-card__arrow {
              background-color: var(--crimson);
            }

            &::before {
              background: linear-gradient(90deg, #d9d9e2 0%, #f17f20 42%, #e82c51 70.5%);
            }

            &::after {
              background: linear-gradient(90deg, #e82c51 23%, #a143d0 76%, #d9d9e2 100%);
            }
          }

          .main-feature-card[data-color='purple'] {
            & .main-feature-card__arrow {
              background-color: var(--royal-purple);
            }

            &::before {
              background: linear-gradient(90deg, #D9D9E2 0%, #E82C51 31%, #A143D0 78.5%);

            }

            &::after {
              background: linear-gradient(90deg, #A143D0 28%, #12C7EB 74%, #D9D9E2 100%);
            }
          }

          .main-feature-card[data-color='cyan'] {
            & .main-feature-card__arrow {
              background-color: var(--cyan);
            }

            &::before {
              background: linear-gradient(90deg, #d9d9e2 0%, #a143d0 36.5%, #12c7eb 100%);
            }

            &::after {
              background: linear-gradient(90deg, #12c7eb 26%, #009e64 61%, #d9d9e2 100%);
            }
          }

          .main-feature-card[data-color='emerald'] {
            & .main-feature-card__arrow {
              background-color: var(--emerald);
            }

            &::before {
              background: linear-gradient(90deg, #d9d9e2 0%, #12c7eb 39%, #009e64 74%);
            }
          }
        }
      </style>
    </div>
    <div class="js_embed display-none w-embed w-script">
      <script>
        function initFeaturesAnimation() {
          const ACTIVE_CARD_CLASS = 'is-active';
          const CARD_SELECTOR = '.main-feature-card';
          const ANIMATION_INTERVAL = 2000; // ms

          const cards = document.querySelectorAll(CARD_SELECTOR);
          const startIndex = 0;
          const endIndex = cards.length - 1;
          let activeCardIndex = startIndex;
          let direction = 1;
          let animationIntervalRef = null;

          function startAnimation() {
            if (window.innerWidth >= 1200 && !animationIntervalRef) {
              animationIntervalRef = setInterval(activateFeatureCard, ANIMATION_INTERVAL);
              cards.forEach(card => {
                card.addEventListener('mouseover', stopAnimation);
                card.addEventListener('click', stopAnimation);
              });
            }
          }

          function activateFeatureCard() {
            const prevActiveCard = document.querySelector(`${CARD_SELECTOR}.${ACTIVE_CARD_CLASS}`);
            if (prevActiveCard) {
              prevActiveCard.classList.remove(ACTIVE_CARD_CLASS);
            }

            const currentActiveCard = cards[activeCardIndex];
            currentActiveCard.classList.add(ACTIVE_CARD_CLASS);

            if (activeCardIndex === endIndex) {
              direction = -1;
            } else if (activeCardIndex === startIndex) {
              direction = 1;
            }

            activeCardIndex += direction;
          }

          function stopAnimation() {
            if (animationIntervalRef) {
              clearInterval(animationIntervalRef);
              animationIntervalRef = null;
            }
            const activeCard = document.querySelector(`${CARD_SELECTOR}.${ACTIVE_CARD_CLASS}`);
            if (activeCard) {
              activeCard.classList.remove(ACTIVE_CARD_CLASS);
            }
          }

          startAnimation();

          window.addEventListener('resize', () => {
            if (window.innerWidth < 1200) {
              stopAnimation();
            } else {
              startAnimation();
            }
          });
        }
      </script>
      <script defer="" src="data:text/javascript,initFeaturesAnimation();"></script>
