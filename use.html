<script>
const carousel = document.getElementById("carousel");
  const container = document.querySelector(".carousel-container");
  const itemWidth = 336;
  const gap = 20;
  const scrollAmount = itemWidth + gap;

  let rightClicks = 0;
  let leftClicks = 0;
  let activePadding = "left"; // initial state

  function applyPadding(left, right) {
    container.style.paddingLeft = left;
    container.style.paddingRight = right;
  }

  async function scrollCarousel(direction) {
    const currentScroll = carousel.scrollLeft;
    const maxScroll = carousel.scrollWidth - carousel.clientWidth;

    if (direction === "right") {
      rightClicks++;
      leftClicks = 0;

      if (activePadding === "left") {
        applyPadding("0", "0");
        activePadding = null;
      } else if (rightClicks >= 2) {
        applyPadding("0", "18vw");
        activePadding = "right";
      } else {
        applyPadding("0", "0");
        activePadding = null;
      }

      carousel.scrollTo({
        left: Math.min(currentScroll + scrollAmount, maxScroll),
        behavior: "smooth",
      });

    } else if (direction === "left") {
      leftClicks++;
      rightClicks = 0;

      if (activePadding === "right") {
        applyPadding("0", "0");
        activePadding = null;
      } else if (leftClicks >= 2) {
        applyPadding("18vw", "0");
        activePadding = "left";
      } else {
        applyPadding("0", "0");
        activePadding = null;
      }

      carousel.scrollTo({
        left: Math.max(currentScroll - scrollAmount, 0),
        behavior: "smooth",
      });
    }
  }

  // Initial state
  applyPadding("20vw", "0");
</script>
